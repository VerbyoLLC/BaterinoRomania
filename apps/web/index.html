        window.dataLayer = window.dataLayer || [];
        window.dataLayer.push({ 'gtm.start': new Date().getTime(), event: 'gtm.js' });

        script.async = true;
        script.src = 'https://www.googletagmanager.com/gtm.js?id=GTM-NFRKTBHS';
        document.head.appendChild(script);
      })();
    </script>
