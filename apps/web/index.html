<!doctype html>

    <!-- Analytics (GTM) loads only after cookie consent — see src/lib/cookieConsent.ts -->
    <script>
      (function () {
        var match = document.cookie.match(/(?:^|; )baterino_cookie_consent=([^;]*)/);
        if (!match || decodeURIComponent(match[1]) !== '1') return;
        window.dataLayer = window.dataLayer || [];
        window.dataLayer.push({ 'gtm.start': new Date().getTime(), event: 'gtm.js' });
        var script = document.createElement('script');
        script.async = true;
        script.src = 'https://www.googletagmanager.com/gtm.js?id=GTM-NFRKTBHS';
        document.head.appendChild(script);
      })();
    </script>
    <meta charset="UTF-8" />

    <!--
      Static SEO fallback. These defaults are what non-JS crawlers and social
      scrapers (Facebook, LinkedIn, WhatsApp, X) see, since they don't execute
      the SPA. react-helmet-async overrides title/description/OG per route at
      runtime for JS-capable crawlers (Googlebot). Canonical and og:url are
      intentionally NOT set here so they aren't wrongly pinned to the homepage
      on deep links — those are set per page by src/components/SEO.tsx.
    -->
    <title>Baterino Romania — Baterii LiFePO₄ și sisteme de stocare a energiei</title>

    />

    <meta property="og:type" content="website" />
